<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';" />
    <title>Dawning Agent OS — V0</title>
    <style>
      :root {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color-scheme: dark;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        padding: 0;
        background: #1a1a1a;
        color: #f5f5f5;
        font-size: 14px;
        line-height: 1.5;
        height: 100vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      /* Per ADR-032 §决策 A1 the workspace is a 65/35 split:
         left = chat (primary), right = inbox (reference). Min-widths
         keep both panes usable when the user shrinks the window
         below the BrowserWindow minWidth (defense-in-depth). */
      .split {
        flex: 1;
        display: grid;
        grid-template-columns: minmax(480px, 65fr) minmax(320px, 35fr);
        min-height: 0;
        border-top: 1px solid #2a2a2a;
      }
      .chat-pane {
        display: flex;
        flex-direction: column;
        min-width: 0;
        min-height: 0;
        border-right: 1px solid #2a2a2a;
      }
      .inbox-pane {
        display: flex;
        flex-direction: column;
        min-width: 0;
        min-height: 0;
        padding: 16px 20px;
        overflow-y: auto;
      }
      header.app {
        flex-shrink: 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 20px;
      }
      header.app .brand {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      header.app .brand img {
        width: 28px;
        height: 35px;
        flex-shrink: 0;
      }
      header.app h1 {
        font-size: 16px;
        font-weight: 500;
        margin: 0;
        opacity: 0.85;
      }
      header.app .status {
        font-size: 12px;
        opacity: 0.6;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      }
      header.app .status.ok { color: #4ade80; opacity: 0.85; }
      header.app .status.err { color: #f87171; opacity: 0.95; }
      section { margin-bottom: 20px; }
      label {
        display: block;
        font-size: 12px;
        opacity: 0.7;
        margin-bottom: 4px;
      }
      textarea, input[type="text"] {
        width: 100%;
        background: #0d0d0d;
        border: 1px solid #2a2a2a;
        border-radius: 4px;
        color: #f5f5f5;
        font-family: inherit;
        font-size: 13px;
        padding: 8px 10px;
        outline: none;
      }
      textarea {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        resize: vertical;
        min-height: 90px;
      }
      textarea:focus, input[type="text"]:focus {
        border-color: #4ade80;
      }
      .row { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
      .row input[type="text"] { flex: 1; }
      button {
        background: #2a2a2a;
        color: #f5f5f5;
        border: 1px solid #3a3a3a;
        border-radius: 4px;
        padding: 6px 14px;
        font-size: 13px;
        cursor: pointer;
      }
      button:hover { background: #333; }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      button.primary { background: #166534; border-color: #166534; }
      button.primary:hover:not(:disabled) { background: #15803d; }
      .error {
        margin-top: 8px;
        padding: 8px 10px;
        background: #2a0d0d;
        border: 1px solid #5a1d1d;
        border-radius: 4px;
        color: #f87171;
        font-size: 12px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        white-space: pre-wrap;
      }
      .list-header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 8px;
      }
      .list-header h2 {
        font-size: 14px;
        font-weight: 500;
        margin: 0;
        opacity: 0.85;
      }
      .list-header .count {
        font-size: 12px;
        opacity: 0.6;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      }
      ul {
        list-style: none;
        padding: 0;
        margin: 0;
      }
      li {
        background: #0d0d0d;
        border: 1px solid #2a2a2a;
        border-radius: 4px;
        padding: 10px 12px;
        margin-bottom: 6px;
      }
      li .content {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 13px;
        white-space: pre-wrap;
        word-break: break-word;
        margin-bottom: 6px;
      }
      li .meta {
        font-size: 11px;
        opacity: 0.55;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      }
      li .actions {
        margin-top: 8px;
        display: flex;
        gap: 6px;
        align-items: center;
      }
      li .actions button {
        padding: 4px 10px;
        font-size: 12px;
      }
      li .summary {
        margin-top: 8px;
        padding: 8px 10px;
        background: #102018;
        border: 1px solid #1f3a2a;
        border-radius: 4px;
      }
      li .summary-text {
        font-size: 13px;
        line-height: 1.55;
        white-space: pre-wrap;
        word-break: break-word;
      }
      li .summary-meta {
        margin-top: 6px;
        font-size: 11px;
        opacity: 0.5;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      }
      li .summary-error {
        margin-top: 8px;
        padding: 6px 10px;
        background: #2a0d0d;
        border: 1px solid #5a1d1d;
        border-radius: 4px;
        color: #f87171;
        font-size: 12px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        white-space: pre-wrap;
      }
      /* ADR-031 §G1: tag pill list shares the green-ish "LLM output"
         palette of .summary so users read both as model-generated. */
      li .tags {
        margin-top: 8px;
        padding: 8px 10px;
        background: #102018;
        border: 1px solid #1f3a2a;
        border-radius: 4px;
      }
      li .tag-pill-row {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      li .tag-pill {
        display: inline-block;
        padding: 2px 8px;
        font-size: 12px;
        background: #1c3422;
        border: 1px solid #2f5a3a;
        border-radius: 999px;
        color: #d6f5e0;
      }
      li .tags-meta {
        margin-top: 6px;
        font-size: 11px;
        opacity: 0.5;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      }
      li .tags-error {
        margin-top: 8px;
        padding: 6px 10px;
        background: #2a0d0d;
        border: 1px solid #5a1d1d;
        border-radius: 4px;
        color: #f87171;
        font-size: 12px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        white-space: pre-wrap;
      }
      .empty {
        opacity: 0.5;
        font-style: italic;
        font-size: 13px;
        padding: 12px;
        text-align: center;
      }

      /* =========================================================
         Chat pane — ADR-032 §决策 A1 / A2.
         Vertical layout: tabs on top, message stream in the
         middle (auto-scroll to bottom), composer at the bottom.
         ========================================================= */
      .chat-tabs {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 10px 16px;
        border-bottom: 1px solid #2a2a2a;
        overflow-x: auto;
        scrollbar-width: thin;
      }
      .chat-tab {
        flex-shrink: 0;
        max-width: 200px;
        padding: 4px 12px;
        font-size: 12px;
        background: #1f1f1f;
        border: 1px solid #2a2a2a;
        border-radius: 999px;
        color: #d5d5d5;
        cursor: pointer;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        font-family: inherit;
      }
      .chat-tab:hover { background: #262626; }
      .chat-tab.active {
        background: #1c3422;
        border-color: #2f5a3a;
        color: #d6f5e0;
      }
      .chat-tab.new {
        font-weight: 500;
        opacity: 0.85;
      }
      .chat-stream {
        flex: 1;
        overflow-y: auto;
        padding: 16px 20px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        min-height: 0;
      }
      .chat-msg {
        display: flex;
        flex-direction: column;
        max-width: 85%;
        padding: 10px 14px;
        border-radius: 10px;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 13px;
        line-height: 1.55;
      }
      .chat-msg.user {
        align-self: flex-end;
        background: #1c3422;
        border: 1px solid #2f5a3a;
        color: #d6f5e0;
      }
      .chat-msg.assistant {
        align-self: flex-start;
        background: #0d0d0d;
        border: 1px solid #2a2a2a;
      }
      .chat-msg.assistant.streaming::after {
        content: "▍";
        opacity: 0.6;
        margin-left: 2px;
        animation: chat-cursor 1s steps(2, start) infinite;
      }
      @keyframes chat-cursor {
        to { visibility: hidden; }
      }
      .chat-msg .meta {
        margin-top: 6px;
        font-size: 11px;
        opacity: 0.5;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      }
      .chat-msg.error {
        align-self: stretch;
        max-width: none;
        background: #2a0d0d;
        border: 1px solid #5a1d1d;
        color: #f87171;
      }
      .chat-empty {
        margin: auto;
        opacity: 0.5;
        font-style: italic;
        font-size: 13px;
        text-align: center;
      }
      .chat-composer {
        flex-shrink: 0;
        border-top: 1px solid #2a2a2a;
        padding: 12px 16px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .chat-composer textarea {
        width: 100%;
        min-height: 60px;
        max-height: 200px;
        background: #0d0d0d;
        border: 1px solid #2a2a2a;
        border-radius: 6px;
        color: #f5f5f5;
        font-family: inherit;
        font-size: 13px;
        padding: 8px 10px;
        outline: none;
        resize: vertical;
      }
      .chat-composer textarea:focus { border-color: #4ade80; }
      .chat-composer .composer-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
      }
      .chat-composer .hint {
        font-size: 11px;
        opacity: 0.5;
      }
      .chat-error {
        margin: 0 16px 12px;
        padding: 8px 10px;
        background: #2a0d0d;
        border: 1px solid #5a1d1d;
        border-radius: 4px;
        color: #f87171;
        font-size: 12px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        white-space: pre-wrap;
      }

      /* =========================================================
         View system — ADR-033 §决策 K1.
         Two top-level views ("chat & inbox" and "memory") share the
         same window; only one is visible at a time, controlled by a
         hash route (#chat-inbox / #memory) and a header view-switcher.
         The hidden view is detached visually but stays in the DOM so
         its state (chat session, scroll position, capture textarea)
         survives a switch.
         ========================================================= */
      .view {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }
      .view[hidden] { display: none; }

      .view-switcher {
        display: flex;
        gap: 6px;
      }
      .view-switcher button {
        padding: 4px 12px;
        font-size: 12px;
        background: #1f1f1f;
        border: 1px solid #2a2a2a;
        border-radius: 999px;
        color: #d5d5d5;
        cursor: pointer;
        font-family: inherit;
      }
      .view-switcher button:hover { background: #262626; }
      .view-switcher button.active {
        background: #1c3422;
        border-color: #2f5a3a;
        color: #d6f5e0;
      }

      /* =========================================================
         Memory pane — ADR-033 §决策 K1.
         Two-column layout (40/60): left is a list ordered by
         updated_at_utc DESC; right is the detail / edit panel which
         doubles as the "+ 新记忆" composer when no row is selected.
         The toolbar above the list owns "+ 新记忆" and the "显示已删除"
         toggle so users can flip between live and archive views
         without losing their selection.
         ========================================================= */
      .memory-toolbar {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 20px;
        border-bottom: 1px solid #2a2a2a;
      }
      .memory-toolbar .spacer { flex: 1; }
      .memory-toolbar label {
        margin: 0;
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        opacity: 0.75;
        cursor: pointer;
      }
      .memory-toolbar input[type="checkbox"] {
        margin: 0;
        accent-color: #4ade80;
      }
      .memory-toolbar .count {
        font-size: 12px;
        opacity: 0.55;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      }

      .memory-split {
        flex: 1;
        display: grid;
        grid-template-columns: minmax(280px, 40fr) minmax(320px, 60fr);
        min-height: 0;
      }
      .memory-list-pane {
        border-right: 1px solid #2a2a2a;
        overflow-y: auto;
        padding: 12px 16px;
      }
      .memory-detail-pane {
        overflow-y: auto;
        padding: 16px 20px;
      }
      .memory-list {
        list-style: none;
        padding: 0;
        margin: 0;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .memory-list li {
        background: #0d0d0d;
        border: 1px solid #2a2a2a;
        border-radius: 4px;
        padding: 10px 12px;
        cursor: pointer;
        margin: 0;
      }
      .memory-list li:hover { background: #131313; }
      .memory-list li.active {
        border-color: #2f5a3a;
        background: #102018;
      }
      .memory-list li.deleted {
        opacity: 0.55;
      }
      .memory-list li.deleted .row-content {
        text-decoration: line-through;
      }
      .memory-list .row-content {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 13px;
        white-space: pre-wrap;
        word-break: break-word;
        margin-bottom: 6px;
        max-height: 4.6em;
        overflow: hidden;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
      }
      .memory-list .row-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        font-size: 11px;
        opacity: 0.6;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      }
      .memory-list .badge {
        padding: 1px 6px;
        border: 1px solid #2a2a2a;
        border-radius: 999px;
        background: #161616;
      }
      .memory-list .badge.status-active { color: #d6f5e0; border-color: #2f5a3a; }
      .memory-list .badge.status-corrected { color: #fde68a; border-color: #5a4a1d; }
      .memory-list .badge.status-archived { color: #cbd5e1; border-color: #3a3a3a; }
      .memory-list .badge.status-softdeleted { color: #f87171; border-color: #5a1d1d; }
      .memory-list .badge.sens-sensitive { color: #fde68a; border-color: #5a4a1d; }
      .memory-list .badge.sens-highsensitive { color: #f87171; border-color: #5a1d1d; }

      .memory-empty {
        opacity: 0.5;
        font-style: italic;
        font-size: 13px;
        padding: 24px 12px;
        text-align: center;
      }

      .memory-detail h2 {
        font-size: 14px;
        font-weight: 500;
        margin: 0 0 12px 0;
        opacity: 0.85;
      }
      .memory-detail .form-row {
        margin-bottom: 12px;
      }
      .memory-detail label {
        display: block;
        font-size: 12px;
        opacity: 0.7;
        margin-bottom: 4px;
      }
      .memory-detail textarea,
      .memory-detail input[type="text"],
      .memory-detail select {
        width: 100%;
        background: #0d0d0d;
        border: 1px solid #2a2a2a;
        border-radius: 4px;
        color: #f5f5f5;
        font-family: inherit;
        font-size: 13px;
        padding: 8px 10px;
        outline: none;
      }
      .memory-detail textarea {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        resize: vertical;
        min-height: 140px;
      }
      .memory-detail textarea:focus,
      .memory-detail input[type="text"]:focus,
      .memory-detail select:focus { border-color: #4ade80; }

      .memory-detail .form-meta {
        margin-top: 16px;
        padding: 10px 12px;
        background: #0d0d0d;
        border: 1px solid #2a2a2a;
        border-radius: 4px;
        font-size: 11px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        opacity: 0.65;
        line-height: 1.7;
      }
      .memory-detail .form-meta .kv { display: flex; gap: 8px; }
      .memory-detail .form-meta .k {
        min-width: 90px;
        opacity: 0.7;
      }

      .memory-detail .form-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 16px;
        padding-top: 14px;
        border-top: 1px solid #2a2a2a;
      }
      .memory-detail .form-actions .spacer { flex: 1; }
      .memory-detail button.danger {
        background: #2a0d0d;
        border-color: #5a1d1d;
        color: #f87171;
      }
      .memory-detail button.danger:hover:not(:disabled) {
        background: #3a1212;
      }
      .memory-detail button.warn {
        background: #2a200d;
        border-color: #5a4a1d;
        color: #fde68a;
      }
      .memory-detail button.warn:hover:not(:disabled) { background: #3a2c12; }

      .memory-detail .error {
        margin-top: 12px;
      }
      .memory-detail .placeholder {
        opacity: 0.55;
        font-style: italic;
        font-size: 13px;
        padding: 24px 0;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <header class="app">
      <div class="brand">
        <img src="./assets/logo.svg" alt="dawning-agent-os" />
        <h1>dawning-agent-os · chat V0</h1>
      </div>
      <!-- ADR-033 §决策 K1: top-level view-switcher between the
           chat+inbox split and the memory ledger pane. Hash route
           drives the truth (#chat-inbox / #memory) so reload preserves
           the user's view choice. -->
      <div class="view-switcher" role="tablist" aria-label="view">
        <button id="view-btn-chat-inbox" type="button" class="active" role="tab" aria-selected="true">
          💬 chat &amp; inbox
        </button>
        <button id="view-btn-memory" type="button" role="tab" aria-selected="false">
          📒 memory
        </button>
      </div>
      <span id="status" class="status">connecting…</span>
    </header>

    <!-- ADR-033 §决策 K1: existing chat+inbox split is now wrapped in
         a `view` container so it can be hidden when the user flips
         to the memory ledger view. -->
    <div id="view-chat-inbox" class="view">
    <!-- Per ADR-032 §决策 A1: 65/35 split. Chat is the primary pane. -->
    <div class="split">
      <main class="chat-pane" aria-label="chat">
        <div class="chat-tabs" id="chat-tabs"></div>
        <div class="chat-stream" id="chat-stream">
          <div class="chat-empty" id="chat-empty">connecting…</div>
        </div>
        <div id="chat-error" class="chat-error" hidden></div>
        <div class="chat-composer">
          <textarea
            id="chat-input"
            rows="3"
            placeholder="给主人发条消息…  (Cmd/Ctrl+Enter 发送)"
            disabled
          ></textarea>
          <div class="composer-row">
            <span class="hint" id="chat-hint">主人，正在准备会话…</span>
            <button id="chat-send" class="primary" type="button" disabled>Send</button>
          </div>
        </div>
      </main>

      <aside class="inbox-pane" aria-label="inbox">
        <section>
          <label for="content">Capture a thought (≤ 4096 chars)</label>
          <textarea id="content" rows="4" placeholder="What's on your mind?"></textarea>
          <div class="row">
            <input id="source" type="text" placeholder="source (optional, ≤ 64 chars)" />
            <button id="capture-btn" class="primary" type="button">Capture</button>
          </div>
          <div id="capture-error" class="error" hidden></div>
        </section>

        <section>
          <div class="list-header">
            <h2>Recent items</h2>
            <span class="count" id="list-count">—</span>
          </div>
          <div class="row" style="margin-top: 0; margin-bottom: 8px;">
            <button id="refresh-btn" type="button">Refresh</button>
          </div>
          <ul id="list"></ul>
          <div id="list-empty" class="empty" hidden>no items yet · capture one above</div>
          <div id="list-error" class="error" hidden></div>
        </section>
      </aside>
    </div>
    </div><!-- /#view-chat-inbox -->

    <!-- ADR-033 §决策 K1: memory ledger pane. Two-column layout
         (40/60): left = list ordered by updated_at_utc DESC, right =
         detail / edit panel. The detail pane doubles as the "+ 新记忆"
         composer when no row is selected. -->
    <div id="view-memory" class="view" hidden>
      <div class="memory-toolbar">
        <button id="memory-new-btn" class="primary" type="button">+ 新记忆</button>
        <button id="memory-refresh-btn" type="button">Refresh</button>
        <label>
          <input id="memory-show-deleted" type="checkbox" />
          显示已删除
        </label>
        <span class="spacer"></span>
        <span id="memory-count" class="count">—</span>
      </div>
      <div class="memory-split">
        <aside class="memory-list-pane" aria-label="memory list">
          <ul id="memory-list" class="memory-list"></ul>
          <div id="memory-list-empty" class="memory-empty" hidden>
            尚无记忆 · 点击 "+ 新记忆" 开始
          </div>
          <div id="memory-list-error" class="error" hidden></div>
        </aside>
        <main id="memory-detail" class="memory-detail-pane memory-detail" aria-label="memory detail">
          <div id="memory-placeholder" class="placeholder">
            从左侧选择一条记忆查看详情，或点击 "+ 新记忆"。
          </div>
          <div id="memory-form" hidden>
            <h2 id="memory-form-title">新建记忆</h2>
            <div class="form-row">
              <label for="memory-content">内容（≤ 4096 chars）</label>
              <textarea id="memory-content" rows="6" placeholder="用主语第一人称写下要记住的事实……"></textarea>
            </div>
            <div class="form-row">
              <label for="memory-scope">作用域 scope（可选；默认 "global"，≤ 128 chars）</label>
              <input id="memory-scope" type="text" placeholder="global / project:dawning / …" />
            </div>
            <div class="form-row">
              <label for="memory-sensitivity">敏感度 sensitivity</label>
              <select id="memory-sensitivity">
                <option value="Normal">Normal</option>
                <option value="Sensitive">Sensitive</option>
                <option value="HighSensitive">HighSensitive</option>
              </select>
            </div>
            <div class="form-row" id="memory-status-row" hidden>
              <label for="memory-status">状态 status</label>
              <select id="memory-status">
                <option value="Active">Active</option>
                <option value="Corrected">Corrected</option>
                <option value="Archived">Archived</option>
              </select>
            </div>
            <div class="form-meta" id="memory-meta" hidden>
              <div class="kv"><span class="k">id</span><span id="meta-id"></span></div>
              <div class="kv"><span class="k">source</span><span id="meta-source"></span></div>
              <div class="kv"><span class="k">confidence</span><span id="meta-confidence"></span></div>
              <div class="kv"><span class="k">created</span><span id="meta-created"></span></div>
              <div class="kv"><span class="k">updated</span><span id="meta-updated"></span></div>
              <div class="kv" id="meta-deleted-row" hidden><span class="k">deleted</span><span id="meta-deleted"></span></div>
            </div>
            <div id="memory-form-error" class="error" hidden></div>
            <div class="form-actions">
              <button id="memory-save-btn" class="primary" type="button">保存</button>
              <button id="memory-cancel-btn" type="button">取消</button>
              <span class="spacer"></span>
              <button id="memory-restore-btn" class="warn" type="button" hidden>恢复</button>
              <button id="memory-delete-btn" class="danger" type="button" hidden>软删</button>
            </div>
          </div>
        </main>
      </div>
    </div><!-- /#view-memory -->

    <script>
      // Per ADR-027 §1 / §6 / §7 this script is intentionally inline.
      // No bundler, no framework. All HTTP goes through window.agentos.*
      // which is provided by the preload bridge (dist/preload.cjs.js).
      const LIST_LIMIT = 50;

      const $ = (id) => document.getElementById(id);
      const els = {
        status: $('status'),
        content: $('content'),
        source: $('source'),
        capture: $('capture-btn'),
        captureErr: $('capture-error'),
        list: $('list'),
        listCount: $('list-count'),
        listEmpty: $('list-empty'),
        listErr: $('list-error'),
        refresh: $('refresh-btn'),
      };

      const bridgeMissing = !(window.agentos && window.agentos.runtime && window.agentos.inbox);
      const chatBridge = window.agentos && window.agentos.chat;

      const setStatus = (text, kind) => {
        els.status.textContent = text;
        els.status.className = 'status ' + (kind || '');
      };

      const showError = (el, text) => {
        el.textContent = text;
        el.removeAttribute('hidden');
      };
      const hideError = (el) => { el.setAttribute('hidden', ''); el.textContent = ''; };

      const formatProblem = (problem, status) => {
        if (!problem) return 'http ' + status;
        const parts = [];
        if (problem.title) parts.push(problem.title);
        if (problem.detail) parts.push(problem.detail);
        if (problem.errors && typeof problem.errors === 'object') {
          for (const [field, msgs] of Object.entries(problem.errors)) {
            if (Array.isArray(msgs)) {
              for (const msg of msgs) parts.push(field + ': ' + msg);
            }
          }
        }
        if (parts.length === 0) parts.push('http ' + status);
        return parts.join('\n');
      };

      const formatTimestamp = (iso) => {
        try {
          const d = new Date(iso);
          return d.toISOString().replace('T', ' ').replace(/\.\d+Z$/, 'Z');
        } catch (_) { return iso; }
      };

      const renderList = (page) => {
        els.list.innerHTML = '';
        if (!page.items || page.items.length === 0) {
          els.listEmpty.removeAttribute('hidden');
          els.listCount.textContent = '0 items';
          return;
        }
        els.listEmpty.setAttribute('hidden', '');
        for (const item of page.items) {
          const li = document.createElement('li');
          const content = document.createElement('div');
          content.className = 'content';
          content.textContent = item.content;
          const meta = document.createElement('div');
          meta.className = 'meta';
          const source = item.source ? item.source : '—';
          const idShort = (item.id || '').substring(0, 8);
          meta.textContent = source + ' · ' + formatTimestamp(item.capturedAtUtc) + ' · ' + idShort;
          li.appendChild(content);
          li.appendChild(meta);

          // ADR-030 / ADR-027 §10: per-item summarize button. Each click
          // invokes the active LLM provider (non-idempotent), so we do
          // not auto-trigger and we surface model + token + duration so
          // users can feel the cost.
          const actions = document.createElement('div');
          actions.className = 'actions';
          const summarizeBtn = document.createElement('button');
          summarizeBtn.type = 'button';
          summarizeBtn.textContent = 'Summarize';
          actions.appendChild(summarizeBtn);
          // ADR-031 §G1: sister "Tags" button. Same non-idempotency
          // model — each click hits the LLM and may yield different
          // tags. Server already normalizes (1-5 tags, 2-12 chars,
          // dedup), so we can render the array verbatim.
          const tagBtn = document.createElement('button');
          tagBtn.type = 'button';
          tagBtn.textContent = 'Tags';
          actions.appendChild(tagBtn);
          li.appendChild(actions);

          const summaryBox = document.createElement('div');
          summaryBox.className = 'summary';
          summaryBox.hidden = true;
          li.appendChild(summaryBox);

          const summaryErr = document.createElement('div');
          summaryErr.className = 'summary-error';
          summaryErr.hidden = true;
          li.appendChild(summaryErr);

          const tagsBox = document.createElement('div');
          tagsBox.className = 'tags';
          tagsBox.hidden = true;
          li.appendChild(tagsBox);

          const tagsErr = document.createElement('div');
          tagsErr.className = 'tags-error';
          tagsErr.hidden = true;
          li.appendChild(tagsErr);

          summarizeBtn.addEventListener('click', async () => {
            summaryErr.hidden = true;
            summaryErr.textContent = '';
            const previousLabel = summarizeBtn.dataset.label || 'Summarize';
            summarizeBtn.dataset.label = previousLabel;
            summarizeBtn.disabled = true;
            summarizeBtn.textContent = 'Summarizing…';
            try {
              const result = await window.agentos.inbox.summarize(item.id);
              if (result.ok) {
                summaryBox.innerHTML = '';
                const text = document.createElement('div');
                text.className = 'summary-text';
                text.textContent = result.value.summary;
                summaryBox.appendChild(text);

                const metaLine = document.createElement('div');
                metaLine.className = 'summary-meta';
                const parts = [];
                parts.push(result.value.model || 'unknown');
                if (typeof result.value.promptTokens === 'number'
                    && typeof result.value.completionTokens === 'number') {
                  parts.push('prompt ' + result.value.promptTokens
                    + ' + completion ' + result.value.completionTokens + ' tokens');
                }
                if (typeof result.value.durationMs === 'number') {
                  parts.push(result.value.durationMs + 'ms');
                }
                metaLine.textContent = parts.join(' · ');
                summaryBox.appendChild(metaLine);

                summaryBox.hidden = false;
                // After a successful run the button stays as "Re-summarize"
                // so users discover that the call is non-idempotent.
                summarizeBtn.textContent = 'Re-summarize';
              } else {
                summaryErr.textContent = formatProblem(result.problem, result.status);
                summaryErr.hidden = false;
                summarizeBtn.textContent = previousLabel;
              }
            } catch (err) {
              summaryErr.textContent = (err && err.message) ? err.message : String(err);
              summaryErr.hidden = false;
              summarizeBtn.textContent = previousLabel;
            } finally {
              summarizeBtn.disabled = false;
            }
          });

          tagBtn.addEventListener('click', async () => {
            tagsErr.hidden = true;
            tagsErr.textContent = '';
            const previousLabel = tagBtn.dataset.label || 'Tags';
            tagBtn.dataset.label = previousLabel;
            tagBtn.disabled = true;
            tagBtn.textContent = 'Tagging…';
            try {
              const result = await window.agentos.inbox.suggestTags(item.id);
              if (result.ok) {
                tagsBox.innerHTML = '';
                const row = document.createElement('div');
                row.className = 'tag-pill-row';
                for (const tag of result.value.tags || []) {
                  const pill = document.createElement('span');
                  pill.className = 'tag-pill';
                  pill.textContent = tag;
                  row.appendChild(pill);
                }
                tagsBox.appendChild(row);

                const metaLine = document.createElement('div');
                metaLine.className = 'tags-meta';
                const parts = [];
                parts.push(result.value.model || 'unknown');
                if (typeof result.value.promptTokens === 'number'
                    && typeof result.value.completionTokens === 'number') {
                  parts.push('prompt ' + result.value.promptTokens
                    + ' + completion ' + result.value.completionTokens + ' tokens');
                }
                if (typeof result.value.durationMs === 'number') {
                  parts.push(result.value.durationMs + 'ms');
                }
                metaLine.textContent = parts.join(' · ');
                tagsBox.appendChild(metaLine);

                tagsBox.hidden = false;
                // Same non-idempotency relabel pattern as Summarize.
                tagBtn.textContent = 'Re-tag';
              } else {
                tagsErr.textContent = formatProblem(result.problem, result.status);
                tagsErr.hidden = false;
                tagBtn.textContent = previousLabel;
              }
            } catch (err) {
              tagsErr.textContent = (err && err.message) ? err.message : String(err);
              tagsErr.hidden = false;
              tagBtn.textContent = previousLabel;
            } finally {
              tagBtn.disabled = false;
            }
          });

          els.list.appendChild(li);
        }
        const showing = page.items.length;
        const total = typeof page.total === 'number' ? page.total : showing;
        els.listCount.textContent = 'showing ' + showing + ' of ' + total;
      };

      const refreshStatus = async () => {
        try {
          const status = await window.agentos.runtime.getStatus();
          const ready = status && status.database && status.database.ready === true;
          const ver = status && status.database ? status.database.schemaVersion : '?';
          setStatus('schema=' + ver + ' · api=' + (ready ? 'ok' : 'down'), ready ? 'ok' : 'err');
        } catch (err) {
          setStatus('api=disconnected', 'err');
        }
      };

      const refreshList = async () => {
        hideError(els.listErr);
        try {
          const result = await window.agentos.inbox.list({ limit: LIST_LIMIT, offset: 0 });
          if (result.ok) {
            renderList(result.value);
          } else {
            showError(els.listErr, formatProblem(result.problem, result.status));
          }
        } catch (err) {
          showError(els.listErr, (err && err.message) ? err.message : String(err));
        }
      };

      const capture = async () => {
        hideError(els.captureErr);
        const content = els.content.value;
        const source = els.source.value.trim();
        if (!content.trim()) {
          showError(els.captureErr, 'content: required');
          return;
        }
        els.capture.disabled = true;
        try {
          const req = source ? { content, source } : { content };
          const result = await window.agentos.inbox.capture(req);
          if (result.ok) {
            els.content.value = '';
            // keep source field as-is, users often capture in batches
            await refreshList();
          } else {
            showError(els.captureErr, formatProblem(result.problem, result.status));
          }
        } catch (err) {
          showError(els.captureErr, (err && err.message) ? err.message : String(err));
        } finally {
          els.capture.disabled = false;
        }
      };

      els.capture.addEventListener('click', capture);
      els.refresh.addEventListener('click', refreshList);
      els.content.addEventListener('keydown', (ev) => {
        // cmd/ctrl+enter submits
        if ((ev.metaKey || ev.ctrlKey) && ev.key === 'Enter') {
          ev.preventDefault();
          capture();
        }
      });

      // ===========================================================
      // Chat module — ADR-032 §决策 A1 / A2 / I1 / J1.
      //
      //   - On startup we list sessions; if empty we create one and
      //     pick it as current. Otherwise we pick the most-recent
      //     session (server already returns updated_at DESC, so
      //     items[0] is "the latest").
      //   - The mini-sidebar is a horizontal tab bar across the top
      //     of the chat pane (§A2). The "+" tab opens a new session.
      //   - The composer streams replies via the SSE bridge: we send
      //     the user turn, append an empty assistant bubble, and
      //     accumulate `chunk` deltas into it. On `done` we re-fetch
      //     `listSessions` so the sidebar picks up the auto-derived
      //     title and updated_at ordering. On `error` the assistant
      //     bubble is dropped and a red error bubble takes its place.
      //   - Per ADR-032 §决策 J1 the user message is persisted by the
      //     server BEFORE the LLM call, so even if the stream dies we
      //     don't lose what the user typed; on subsequent send the
      //     server resends the canonical history.
      // ===========================================================
      const chat = (() => {
        const tabsEl = $('chat-tabs');
        const streamEl = $('chat-stream');
        const emptyEl = $('chat-empty');
        const errorEl = $('chat-error');
        const inputEl = $('chat-input');
        const sendBtn = $('chat-send');
        const hintEl = $('chat-hint');

        let sessions = [];
        let currentSessionId = null;
        let streaming = false;

        const showChatError = (text) => {
          errorEl.textContent = text;
          errorEl.removeAttribute('hidden');
        };
        const hideChatError = () => {
          errorEl.setAttribute('hidden', '');
          errorEl.textContent = '';
        };

        const setHint = (text) => { hintEl.textContent = text; };

        const setComposerEnabled = (enabled) => {
          inputEl.disabled = !enabled;
          sendBtn.disabled = !enabled;
        };

        const renderTabs = () => {
          tabsEl.innerHTML = '';
          for (const session of sessions) {
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'chat-tab' + (session.id === currentSessionId ? ' active' : '');
            btn.textContent = session.title || '新会话';
            btn.title = session.title || '新会话';
            btn.addEventListener('click', () => { void switchTo(session.id); });
            tabsEl.appendChild(btn);
          }
          const newBtn = document.createElement('button');
          newBtn.type = 'button';
          newBtn.className = 'chat-tab new';
          newBtn.textContent = '+ 新会话';
          newBtn.title = '新建会话';
          newBtn.addEventListener('click', () => { void createNewSession(); });
          tabsEl.appendChild(newBtn);
        };

        const renderEmptyMessages = () => {
          streamEl.innerHTML = '';
          const hint = document.createElement('div');
          hint.className = 'chat-empty';
          hint.textContent = '主人，请说。';
          streamEl.appendChild(hint);
        };

        const renderMessages = (messages) => {
          streamEl.innerHTML = '';
          if (!messages || messages.length === 0) {
            renderEmptyMessages();
            return;
          }
          for (const msg of messages) {
            streamEl.appendChild(renderBubble(msg));
          }
          scrollToBottom();
        };

        const renderBubble = (msg) => {
          const div = document.createElement('div');
          div.className = 'chat-msg ' + (msg.role === 'user' ? 'user' : 'assistant');
          const text = document.createElement('div');
          text.className = 'text';
          text.textContent = msg.content || '';
          div.appendChild(text);
          if (msg.role === 'assistant'
              && (msg.model || typeof msg.promptTokens === 'number'
                  || typeof msg.completionTokens === 'number')) {
            const meta = document.createElement('div');
            meta.className = 'meta';
            const parts = [];
            if (msg.model) parts.push(msg.model);
            if (typeof msg.promptTokens === 'number'
                && typeof msg.completionTokens === 'number') {
              parts.push('prompt ' + msg.promptTokens
                + ' + completion ' + msg.completionTokens + ' tokens');
            }
            meta.textContent = parts.join(' · ');
            div.appendChild(meta);
          }
          return div;
        };

        const scrollToBottom = () => {
          streamEl.scrollTop = streamEl.scrollHeight;
        };

        const loadSessions = async () => {
          const result = await chatBridge.listSessions({ limit: 50, offset: 0 });
          if (!result.ok) {
            throw new Error(formatProblem(result.problem, result.status));
          }
          sessions = (result.value && result.value.items) || [];
        };

        const loadMessages = async (sessionId) => {
          const result = await chatBridge.listMessages(sessionId);
          if (!result.ok) {
            throw new Error(formatProblem(result.problem, result.status));
          }
          renderMessages(result.value || []);
        };

        const switchTo = async (sessionId) => {
          if (streaming || sessionId === currentSessionId) {
            return;
          }
          currentSessionId = sessionId;
          renderTabs();
          hideChatError();
          try {
            await loadMessages(sessionId);
            setHint('主人，请说。');
            setComposerEnabled(true);
            inputEl.focus();
          } catch (err) {
            showChatError((err && err.message) ? err.message : String(err));
            setHint('载入历史失败');
          }
        };

        const createNewSession = async () => {
          if (streaming) return;
          hideChatError();
          setComposerEnabled(false);
          setHint('正在创建新会话…');
          try {
            const result = await chatBridge.createSession();
            if (!result.ok) {
              throw new Error(formatProblem(result.problem, result.status));
            }
            await loadSessions();
            currentSessionId = result.value.session.id;
            renderTabs();
            renderEmptyMessages();
            setHint('主人，请说。');
            setComposerEnabled(true);
            inputEl.focus();
          } catch (err) {
            showChatError((err && err.message) ? err.message : String(err));
            setHint('创建会话失败');
            setComposerEnabled(true);
          }
        };

        const send = async () => {
          if (streaming) return;
          if (!currentSessionId) {
            showChatError('当前没有会话；请先点击 "+ 新会话"。');
            return;
          }
          const content = inputEl.value;
          if (!content.trim()) {
            return;
          }
          hideChatError();

          // If this is the first turn the stream view still shows the
          // placeholder; clear it so the user bubble lands at the top.
          if (streamEl.querySelector('.chat-empty')) {
            streamEl.innerHTML = '';
          }

          // 1) Optimistic user bubble — server already accepted the
          //    user turn before LLM call (ADR-032 §决策 J1), so even if
          //    the stream dies the visual stays consistent.
          const userBubble = renderBubble({ role: 'user', content });
          streamEl.appendChild(userBubble);

          // 2) Empty assistant bubble we'll fill from chunk frames.
          const assistantBubble = document.createElement('div');
          assistantBubble.className = 'chat-msg assistant streaming';
          const assistantText = document.createElement('div');
          assistantText.className = 'text';
          assistantBubble.appendChild(assistantText);
          streamEl.appendChild(assistantBubble);
          scrollToBottom();

          inputEl.value = '';
          setComposerEnabled(false);
          setHint('正在生成回复…');
          streaming = true;

          let sawError = false;
          let assistantText_ = '';
          try {
            const result = await chatBridge.sendMessage(
              currentSessionId,
              content,
              (frame) => {
                if (frame.kind === 'chunk') {
                  if (typeof frame.delta === 'string') {
                    assistantText_ += frame.delta;
                    assistantText.textContent = assistantText_;
                    scrollToBottom();
                  }
                } else if (frame.kind === 'done') {
                  assistantBubble.classList.remove('streaming');
                  if (frame.model
                      || typeof frame.promptTokens === 'number'
                      || typeof frame.completionTokens === 'number'
                      || typeof frame.durationMs === 'number') {
                    const meta = document.createElement('div');
                    meta.className = 'meta';
                    const parts = [];
                    if (frame.model) parts.push(frame.model);
                    if (typeof frame.promptTokens === 'number'
                        && typeof frame.completionTokens === 'number') {
                      parts.push('prompt ' + frame.promptTokens
                        + ' + completion ' + frame.completionTokens + ' tokens');
                    }
                    if (typeof frame.durationMs === 'number') {
                      parts.push(frame.durationMs + 'ms');
                    }
                    meta.textContent = parts.join(' · ');
                    assistantBubble.appendChild(meta);
                  }
                } else if (frame.kind === 'error') {
                  sawError = true;
                  // Replace the partial assistant bubble with an error
                  // bubble so the visual doesn't claim a half answer
                  // is "the answer".
                  assistantBubble.classList.remove('streaming', 'assistant');
                  assistantBubble.classList.add('error');
                  const code = (frame.code || 'llm.upstreamUnavailable');
                  const message = (frame.message || 'Stream failed.');
                  assistantText.textContent = code + ' — ' + message;
                }
              },
            );
            if (!result.ok) {
              // Pre-stream failure (validation / 404 / auth). Rollback
              // optimistic bubbles and surface a JSON ProblemDetails.
              assistantBubble.remove();
              userBubble.remove();
              if (streamEl.children.length === 0) {
                renderEmptyMessages();
              }
              showChatError(formatProblem(result.problem, result.status));
              // Restore the user's typed content so they can retry
              // without re-typing.
              inputEl.value = content;
            }
          } catch (err) {
            assistantBubble.classList.remove('streaming', 'assistant');
            assistantBubble.classList.add('error');
            assistantText.textContent =
              (err && err.message) ? err.message : String(err);
            sawError = true;
          } finally {
            streaming = false;
            setComposerEnabled(true);
            setHint('主人，请说。');
            inputEl.focus();
          }

          // Refresh the sidebar so the auto-derived title and
          // updated_at-based ordering catch up. Skip the call when
          // the request never reached the LLM (we'd just re-fetch the
          // same list).
          if (!sawError || assistantText_.length > 0) {
            try {
              await loadSessions();
              renderTabs();
            } catch (_) {
              // Sidebar refresh is cosmetic; failure here doesn't
              // affect the conversation that just happened.
            }
          }
        };

        const init = async () => {
          if (!chatBridge) {
            setHint('chat bridge 缺失');
            showChatError('preload bridge missing — run `pnpm run dev`');
            return;
          }
          try {
            await loadSessions();
            // §决策 I1: empty list ⇒ POST a session and use it as current.
            if (sessions.length === 0) {
              const created = await chatBridge.createSession();
              if (!created.ok) {
                throw new Error(formatProblem(created.problem, created.status));
              }
              await loadSessions();
              currentSessionId = created.value.session.id;
            } else {
              currentSessionId = sessions[0].id;
            }
            renderTabs();
            await loadMessages(currentSessionId);
            setHint('主人，请说。');
            setComposerEnabled(true);
          } catch (err) {
            const text = (err && err.message) ? err.message : String(err);
            showChatError(text);
            setHint('chat 初始化失败');
          }
        };

        sendBtn.addEventListener('click', () => { void send(); });
        inputEl.addEventListener('keydown', (ev) => {
          if ((ev.metaKey || ev.ctrlKey) && ev.key === 'Enter') {
            ev.preventDefault();
            void send();
          }
        });

        return { init };
      })();

      // ===========================================================
      // Memory ledger module — ADR-033 §决策 K1.
      //
      //   - List ordered by updated_at_utc DESC, id DESC (server-side).
      //   - "+ 新记忆" puts the right pane in CREATE mode (empty form).
      //   - Selecting a row puts the right pane in EDIT mode and
      //     prefills content / scope / sensitivity / status fields.
      //   - "保存" branches: CREATE → POST /api/memory; EDIT → PATCH
      //     /api/memory/{id} with whatever fields actually changed
      //     (server returns memory.update.empty if all-null, but we
      //     guard renderer-side too so the user gets a friendlier
      //     "没有改动" hint without round-trip).
      //   - "软删" is a confirm + DELETE. The list reloads under the
      //     current "显示已删除" toggle, so the row vanishes by default
      //     and reappears greyed-out with "恢复" available when toggle
      //     is on.
      //   - "恢复" calls the dedicated restore IPC (PATCH status=Active);
      //     server enforces the SoftDeleted → Active transition rule.
      // ===========================================================
      const memoryBridge = window.agentos && window.agentos.memory;
      const memory = (() => {
        const listEl = $('memory-list');
        const listEmpty = $('memory-list-empty');
        const listErr = $('memory-list-error');
        const countEl = $('memory-count');
        const newBtn = $('memory-new-btn');
        const refreshBtn = $('memory-refresh-btn');
        const showDeletedToggle = $('memory-show-deleted');
        const placeholder = $('memory-placeholder');
        const form = $('memory-form');
        const formTitle = $('memory-form-title');
        const contentInput = $('memory-content');
        const scopeInput = $('memory-scope');
        const sensInput = $('memory-sensitivity');
        const statusRow = $('memory-status-row');
        const statusInput = $('memory-status');
        const metaBox = $('memory-meta');
        const metaId = $('meta-id');
        const metaSource = $('meta-source');
        const metaConfidence = $('meta-confidence');
        const metaCreated = $('meta-created');
        const metaUpdated = $('meta-updated');
        const metaDeletedRow = $('meta-deleted-row');
        const metaDeleted = $('meta-deleted');
        const formErr = $('memory-form-error');
        const saveBtn = $('memory-save-btn');
        const cancelBtn = $('memory-cancel-btn');
        const deleteBtn = $('memory-delete-btn');
        const restoreBtn = $('memory-restore-btn');

        let entries = [];
        let mode = 'idle'; // 'idle' | 'create' | 'edit'
        let selectedId = null;
        // While a row is in EDIT mode this is the snapshot we PATCH-diff
        // against so we can omit unchanged fields (avoiding redundant
        // server-side state-machine checks).
        let original = null;
        let listVersion = 0;

        const showFormErr = (text) => {
          formErr.textContent = text;
          formErr.removeAttribute('hidden');
        };
        const hideFormErr = () => {
          formErr.setAttribute('hidden', '');
          formErr.textContent = '';
        };
        const showListErr = (text) => {
          listErr.textContent = text;
          listErr.removeAttribute('hidden');
        };
        const hideListErr = () => {
          listErr.setAttribute('hidden', '');
          listErr.textContent = '';
        };

        const showPlaceholder = () => {
          placeholder.removeAttribute('hidden');
          form.setAttribute('hidden', '');
        };
        const showForm = () => {
          placeholder.setAttribute('hidden', '');
          form.removeAttribute('hidden');
        };

        const setListLoading = (loading) => {
          refreshBtn.disabled = loading;
          newBtn.disabled = loading;
        };

        const setFormBusy = (busy) => {
          saveBtn.disabled = busy;
          cancelBtn.disabled = busy;
          deleteBtn.disabled = busy;
          restoreBtn.disabled = busy;
        };

        const renderList = () => {
          listEl.innerHTML = '';
          if (!entries || entries.length === 0) {
            listEmpty.removeAttribute('hidden');
            countEl.textContent = '0 条';
            return;
          }
          listEmpty.setAttribute('hidden', '');
          for (const entry of entries) {
            const li = document.createElement('li');
            const isDeleted = entry.status === 'SoftDeleted';
            li.className =
              (entry.id === selectedId ? 'active ' : '') +
              (isDeleted ? 'deleted' : '');
            const content = document.createElement('div');
            content.className = 'row-content';
            content.textContent = entry.content;
            li.appendChild(content);

            const meta = document.createElement('div');
            meta.className = 'row-meta';
            const updated = formatTimestamp(entry.updatedAt);
            const updatedSpan = document.createElement('span');
            updatedSpan.textContent = updated;
            meta.appendChild(updatedSpan);

            const statusBadge = document.createElement('span');
            statusBadge.className = 'badge status-' + entry.status.toLowerCase();
            statusBadge.textContent = entry.status;
            meta.appendChild(statusBadge);

            if (entry.sensitivity && entry.sensitivity !== 'Normal') {
              const sensBadge = document.createElement('span');
              sensBadge.className = 'badge sens-' + entry.sensitivity.toLowerCase();
              sensBadge.textContent = entry.sensitivity;
              meta.appendChild(sensBadge);
            }
            if (entry.scope && entry.scope !== 'global') {
              const scopeBadge = document.createElement('span');
              scopeBadge.className = 'badge';
              scopeBadge.textContent = entry.scope;
              meta.appendChild(scopeBadge);
            }
            li.appendChild(meta);

            li.addEventListener('click', () => { void selectEntry(entry.id); });
            listEl.appendChild(li);
          }
          countEl.textContent = entries.length + ' 条 · 共 ' +
            (typeof entriesTotal === 'number' ? entriesTotal : entries.length) + ' 条';
        };

        let entriesTotal = 0;

        const refresh = async () => {
          if (!memoryBridge) {
            showListErr('preload bridge missing — run `pnpm run dev`');
            return;
          }
          hideListErr();
          setListLoading(true);
          const ticket = ++listVersion;
          try {
            const includeSoftDeleted = showDeletedToggle.checked === true;
            const result = await memoryBridge.list({
              limit: 200,
              offset: 0,
              includeSoftDeleted,
            });
            // Drop stale responses if a newer refresh has already started.
            if (ticket !== listVersion) return;
            if (!result.ok) {
              showListErr(formatProblem(result.problem, result.status));
              entries = [];
              entriesTotal = 0;
              renderList();
              return;
            }
            entries = (result.value && result.value.items) || [];
            entriesTotal =
              typeof result.value.total === 'number' ? result.value.total : entries.length;
            renderList();
            // If the currently-selected row vanished (toggle flipped),
            // fall back to placeholder so the form doesn't claim to
            // edit a row the user can no longer see.
            if (selectedId && !entries.some((e) => e.id === selectedId)) {
              selectedId = null;
              mode = 'idle';
              showPlaceholder();
            }
          } catch (err) {
            if (ticket !== listVersion) return;
            showListErr((err && err.message) ? err.message : String(err));
          } finally {
            if (ticket === listVersion) {
              setListLoading(false);
            }
          }
        };

        const formatMeta = (entry) => {
          metaId.textContent = entry.id;
          metaSource.textContent = entry.source;
          metaConfidence.textContent = String(entry.confidence);
          metaCreated.textContent = formatTimestamp(entry.createdAt);
          metaUpdated.textContent = formatTimestamp(entry.updatedAt);
          if (entry.deletedAt) {
            metaDeletedRow.removeAttribute('hidden');
            metaDeleted.textContent = formatTimestamp(entry.deletedAt);
          } else {
            metaDeletedRow.setAttribute('hidden', '');
            metaDeleted.textContent = '';
          }
        };

        const enterCreateMode = () => {
          hideFormErr();
          mode = 'create';
          selectedId = null;
          original = null;
          formTitle.textContent = '新建记忆';
          contentInput.value = '';
          scopeInput.value = '';
          sensInput.value = 'Normal';
          statusRow.setAttribute('hidden', '');
          metaBox.setAttribute('hidden', '');
          deleteBtn.setAttribute('hidden', '');
          restoreBtn.setAttribute('hidden', '');
          renderList();
          showForm();
          contentInput.focus();
        };

        const enterEditMode = (entry) => {
          hideFormErr();
          mode = 'edit';
          selectedId = entry.id;
          original = entry;
          formTitle.textContent = '编辑记忆';
          contentInput.value = entry.content;
          scopeInput.value = entry.scope || '';
          sensInput.value = entry.sensitivity;
          statusInput.value =
            entry.status === 'SoftDeleted' ? 'Active' : entry.status;
          statusRow.removeAttribute('hidden');
          metaBox.removeAttribute('hidden');
          formatMeta(entry);
          if (entry.status === 'SoftDeleted') {
            // Soft-deleted rows surface "恢复" instead of "软删";
            // status select is read-only because SoftDeleted → other
            // statuses must go through the restore path first.
            restoreBtn.removeAttribute('hidden');
            deleteBtn.setAttribute('hidden', '');
            statusInput.disabled = true;
          } else {
            statusInput.disabled = false;
            deleteBtn.removeAttribute('hidden');
            restoreBtn.setAttribute('hidden', '');
          }
          renderList();
          showForm();
        };

        const selectEntry = async (id) => {
          if (!memoryBridge) return;
          const entry = entries.find((e) => e.id === id);
          if (!entry) {
            // Out of sync; reload then try again.
            await refresh();
            const fresh = entries.find((e) => e.id === id);
            if (fresh) enterEditMode(fresh);
            return;
          }
          enterEditMode(entry);
        };

        const cancel = () => {
          hideFormErr();
          mode = 'idle';
          selectedId = null;
          original = null;
          renderList();
          showPlaceholder();
        };

        const save = async () => {
          if (!memoryBridge) return;
          const content = contentInput.value;
          if (!content || content.trim().length === 0) {
            showFormErr('content: required');
            return;
          }
          const scopeRaw = scopeInput.value;
          const sensitivity = sensInput.value;
          hideFormErr();
          setFormBusy(true);
          try {
            if (mode === 'create') {
              const req = { content };
              const trimmedScope = scopeRaw.trim();
              if (trimmedScope.length > 0) req.scope = trimmedScope;
              if (sensitivity && sensitivity !== 'Normal') {
                req.sensitivity = sensitivity;
              }
              const result = await memoryBridge.create(req);
              if (!result.ok) {
                showFormErr(formatProblem(result.problem, result.status));
                return;
              }
              // Select the freshly-created entry so users can keep
              // editing without an extra click.
              await refresh();
              const created = result.value;
              const found = entries.find((e) => e.id === created.id);
              if (found) {
                enterEditMode(found);
              } else {
                // Created but not visible (filtered by toggle?). Show
                // it in edit mode anyway so the user keeps context.
                enterEditMode(created);
              }
            } else if (mode === 'edit') {
              if (!original) {
                showFormErr('internal: missing original entry');
                return;
              }
              const patch = {};
              if (content !== original.content) patch.content = content;
              const trimmedScope = scopeRaw.trim();
              const desiredScope = trimmedScope.length === 0 ? 'global' : trimmedScope;
              if (desiredScope !== original.scope) patch.scope = desiredScope;
              if (sensitivity !== original.sensitivity) patch.sensitivity = sensitivity;
              if (!statusInput.disabled && statusInput.value !== original.status) {
                patch.status = statusInput.value;
              }
              if (Object.keys(patch).length === 0) {
                showFormErr('没有改动 — 请修改任意字段后再保存。');
                return;
              }
              const result = await memoryBridge.update(original.id, patch);
              if (!result.ok) {
                showFormErr(formatProblem(result.problem, result.status));
                return;
              }
              await refresh();
              const fresh = entries.find((e) => e.id === original.id) || result.value;
              enterEditMode(fresh);
            }
          } catch (err) {
            showFormErr((err && err.message) ? err.message : String(err));
          } finally {
            setFormBusy(false);
          }
        };

        const softDelete = async () => {
          if (!memoryBridge || !original) return;
          // Native confirm is intentionally ugly so users notice.
          // Per ADR-033 §决策 E1 the row remains in the database with
          // status=SoftDeleted; "恢复" puts it back to Active.
          const ok = window.confirm('确认软删该条记忆？\n（不会物理删除；可在 "显示已删除" 中恢复。）');
          if (!ok) return;
          hideFormErr();
          setFormBusy(true);
          try {
            const result = await memoryBridge.softDelete(original.id);
            if (!result.ok) {
              showFormErr(formatProblem(result.problem, result.status));
              return;
            }
            const deletedId = original.id;
            await refresh();
            // If toggle is on, the row reappears as a soft-deleted
            // entry; surface it in edit mode so users see "恢复" right
            // away. Otherwise drop back to placeholder.
            if (showDeletedToggle.checked) {
              const fresh = entries.find((e) => e.id === deletedId);
              if (fresh) {
                enterEditMode(fresh);
                return;
              }
            }
            cancel();
          } catch (err) {
            showFormErr((err && err.message) ? err.message : String(err));
          } finally {
            setFormBusy(false);
          }
        };

        const restore = async () => {
          if (!memoryBridge || !original) return;
          hideFormErr();
          setFormBusy(true);
          try {
            const result = await memoryBridge.restore(original.id);
            if (!result.ok) {
              showFormErr(formatProblem(result.problem, result.status));
              return;
            }
            await refresh();
            const fresh = entries.find((e) => e.id === original.id) || result.value;
            enterEditMode(fresh);
          } catch (err) {
            showFormErr((err && err.message) ? err.message : String(err));
          } finally {
            setFormBusy(false);
          }
        };

        newBtn.addEventListener('click', () => { enterCreateMode(); });
        refreshBtn.addEventListener('click', () => { void refresh(); });
        showDeletedToggle.addEventListener('change', () => { void refresh(); });
        saveBtn.addEventListener('click', () => { void save(); });
        cancelBtn.addEventListener('click', () => { cancel(); });
        deleteBtn.addEventListener('click', () => { void softDelete(); });
        restoreBtn.addEventListener('click', () => { void restore(); });

        const init = async () => {
          if (!memoryBridge) {
            showListErr('preload bridge missing — run `pnpm run dev`');
            newBtn.disabled = true;
            refreshBtn.disabled = true;
            return;
          }
          await refresh();
        };

        return { init };
      })();

      // ===========================================================
      // View-switcher — ADR-033 §决策 K1.
      // Hash route is the source of truth; clicking either header
      // button just sets `location.hash` and the popstate-style
      // listener flips visibility.
      // ===========================================================
      const viewSwitcher = (() => {
        const VIEWS = {
          'chat-inbox': {
            view: $('view-chat-inbox'),
            button: $('view-btn-chat-inbox'),
          },
          memory: {
            view: $('view-memory'),
            button: $('view-btn-memory'),
          },
        };
        let memoryInitialized = false;

        const apply = () => {
          const hash = (location.hash || '').replace(/^#/, '');
          const target = VIEWS[hash] ? hash : 'chat-inbox';
          for (const [key, refs] of Object.entries(VIEWS)) {
            const active = key === target;
            if (active) {
              refs.view.removeAttribute('hidden');
              refs.button.classList.add('active');
              refs.button.setAttribute('aria-selected', 'true');
            } else {
              refs.view.setAttribute('hidden', '');
              refs.button.classList.remove('active');
              refs.button.setAttribute('aria-selected', 'false');
            }
          }
          // Lazy-init memory view on first reveal so we don't eat a
          // round-trip when the user only ever uses chat / inbox.
          if (target === 'memory' && !memoryInitialized) {
            memoryInitialized = true;
            void memory.init();
          }
        };

        const switchTo = (key) => {
          location.hash = '#' + key;
        };

        VIEWS['chat-inbox'].button.addEventListener('click', () => { switchTo('chat-inbox'); });
        VIEWS.memory.button.addEventListener('click', () => { switchTo('memory'); });
        window.addEventListener('hashchange', apply);

        return { apply };
      })();

      if (bridgeMissing) {
        setStatus('preload bridge missing', 'err');
        showError(els.listErr, 'preload bridge missing — run `pnpm run dev` (which builds preload first)');
      } else {
        refreshStatus();
        refreshList();
        void chat.init();
      }
      // Apply the hash route once after both modules wire up so
      // memory.init() runs only when its view becomes visible.
      viewSwitcher.apply();
    </script>
  </body>
</html>
